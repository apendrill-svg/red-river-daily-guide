# Never cache the daily image: the filename is fixed (today.png) but its
# contents change every morning, so any caching would show a stale image.
[[headers]]
  for = "/today.png"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"

# Keep the tiny HTML shell fresh too, so a new image is picked up promptly.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
